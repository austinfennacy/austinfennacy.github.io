<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Austin Fennacy</title>
        
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
        
        <style>
            body {
                background-color: #000b14;
            }
            .buffer {
                margin-top: 300px;
            }
            .text {
                font-size: 1.2rem;
                font-family: "Comic Sans MS", "Comic Sans", sans-serif;
                margin: 2px 0px;
            }
            #text1 {
                color: #cd60f5;
            }
            #text2 {
                color: #41a8fc;
            }
            #text3 {
                color: #fde05e;
            }
            #eyemLookingAtYou {
                font-size: 2rem;
                margin-top: -4px;
                margin-left: -4px;
            }
        </style>
    </head>
    
    <body>
        <div class="container">
            <div class="buffer"></div>
            <div id="text1" class="text">
                a full-stack web-dev without a mantained personal website?
            </div>
            <div id="text2" class="text">
                that's almost as cringe
            </div>
            <div id="text3" class="text">
                as googling his name
            </div>
            <div id="eyemLookingAtYou">
                👀
            </div>
        </div>
    </body>
</html>

<script>
    // don't wait for document to load, otherwise text may flicker before hide
    $('#text1').slideUp(0).delay(500).slideDown(1000);
    $('#text2').slideUp(0).delay(2500).slideDown(1000);
    $('#text3').slideUp(0).delay(5000).slideDown(1000);
    $('#eyemLookingAtYou').slideUp(0).delay(7500).slideDown(2000);
</script>
